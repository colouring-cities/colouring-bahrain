name: Security Audit

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'app/package*.json'
      - 'etl/requirements.txt'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'app/package*.json'
      - 'etl/requirements.txt'
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install npm audit (Node.js vulnerabilities)
      run: npm install -g npm@latest
      
    - name: Audit Node.js dependencies
      run: |
        cd app
        npm ci
        npm audit --audit-level=moderate || true
        echo "Node.js audit complete"

    - name: Install Python auditing tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit safety

    - name: Audit Python dependencies (pip-audit)
      run: |
        pip-audit --requirement etl/requirements.txt || true
        echo "pip-audit complete"

    - name: Audit Python dependencies (safety)
      continue-on-error: true
      run: |
        safety check --file etl/requirements.txt || true
        echo "safety check complete"

    - name: Generate audit report
      if: always()
      run: |
        echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Node.js Audit" >> $GITHUB_STEP_SUMMARY
        cd app && npm audit 2>&1 | head -50 >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Python Audit" >> $GITHUB_STEP_SUMMARY
        echo "See job logs for details" >> $GITHUB_STEP_SUMMARY

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🔒 **Security audit**: See workflow run for integrated vulnerability scan results.'
          })
